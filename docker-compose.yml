services:
  # --- DATABASES ---
  postgres:
    image: postgres:15
    container_name: my-postgres
    restart: always
    environment:
      POSTGRES_USER: ${USERNAME_RSQL}
      POSTGRES_PASSWORD: ${PASSWORD_RSQL}
      POSTGRES_DB: clyvasync_homestay
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - clyvasync-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${USERNAME_RSQL:-postgres} -d clyvasync_homestay" ]
      interval: 10s
      timeout: 5s
      retries: 5


  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: redis-server --requirepass ${PASSWORD_REDIS}
    volumes:
      - redisdata:/data
    networks:
      - clyvasync-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${USERNAME_RABBIT}
      RABBITMQ_DEFAULT_PASS: ${PASSWORD_RABBIT}
    networks:
      - clyvasync-net

  # --- SPICEDB SETUP ---
  db-init:
    image: postgres:15
    environment:
      PGPASSWORD: ${PASSWORD_RSQL:-password}
    command: >
      sh -c "psql -h postgres -U ${USERNAME_RSQL} -d postgres -c 'CREATE DATABASE spicedb;' || true"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clyvasync-net

  spicedb-migrate:
    image: authzed/spicedb:latest
    command: >
      migrate head 
      --datastore-engine postgres 
      --datastore-conn-uri "postgres://${USERNAME_RSQL}:${PASSWORD_RSQL}@postgres:5432/spicedb?sslmode=disable"
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - clyvasync-net

  spicedb:
    image: authzed/spicedb:latest
    container_name: spicedb
    restart: always
    command: >
      serve 
      --datastore-engine postgres 
      --datastore-conn-uri "postgres://${USERNAME_RSQL}:${PASSWORD_RSQL}@postgres:5432/spicedb?sslmode=disable"
      --grpc-preshared-key "${SPICEDB_KEY}"
      --http-enabled
    depends_on:
      spicedb-migrate:
        condition: service_completed_successfully
    networks:
      - clyvasync-net


  # --- BACKEND APP ---
  app:
    # QUAN TRỌNG: Dùng image thay vì build
    image: ${IMAGE_NAME}:${BUILD_NUMBER}
    container_name: clyvasync-be
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      spicedb:
        condition: service_started
      redis:
        condition: service_started

    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: ${DBMSRSQL_CONNECTION}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_DATA_REDIS_HOST: redis
      JETCACHE_REMOTE_DEFAULT_HOST: redis
      JETCACHE_REMOTE_DEFAULT_PASSWORD: ${PASSWORD_REDIS}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPICEDB_ENDPOINT: spicedb:50051
      SPICEDB_KEY: ${SPICEDB_KEY}
    networks:
      - clyvasync-net

networks:
  clyvasync-net:
    driver: bridge

volumes:
  pgdata:
  rabbitmqdata:
  redisdata:
