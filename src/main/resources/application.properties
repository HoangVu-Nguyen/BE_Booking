spring.application.name=Clyvasync
spring.datasource.url=${DBMSRSQL_CONNECTION}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${USERNAME_RSQL}
spring.datasource.password=${PASSWORD_RSQL}
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

spring.flyway.baseline-on-migrate=true

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

spring.flyway.table=flyway_schema_history
aws.access-key=${ACCESS_KEY}
aws.secret-key=${SECRET_KEY}
aws.region=us-east-1
aws.bucket-name=${BUCKET_NAME}
aws.cloudfront.domain=${CLOUDFRONT_DOMAIN}