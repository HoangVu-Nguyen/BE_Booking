spring.application.name=Clyvasync
spring.datasource.url=${DBMSRSQL_CONNECTION}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${USERNAME_RSQL}
spring.datasource.password=${PASSWORD_RSQL}
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true

spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

spring.flyway.baseline-on-migrate=true

spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public

spring.flyway.table=flyway_schema_history
aws.access-key=${ACCESS_KEY}
aws.secret-key=${SECRET_KEY}
aws.region=us-east-1
aws.bucket-name=${BUCKET_NAME}
aws.cloudfront.domain=${CLOUDFRONT_DOMAIN}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${USERNAME_MAIL}
spring.mail.password=${PASSWORD_MAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.rabbitmq.host=${RABBITMQ_CONNECTION}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${USERNAME_RABBIT}
spring.rabbitmq.password=${PASSWORD_RABBIT}
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

spring.data.redis.host=${REDIS_CONNECTION}
spring.data.redis.port=6379
spring.data.redis.password=${PASSWORD_REDIS}
spring.data.redis.timeout=2000

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=2592000000