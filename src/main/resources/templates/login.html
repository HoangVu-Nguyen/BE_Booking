<!DOCTYPE html>
<html class="light" lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>The Modern Curator | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#324c3e",
                        "on-tertiary-container": "#b8ad97",
                        "surface-container-low": "#f6f3ee",
                        "secondary-fixed": "#ffdbcf",
                        "surface-tint": "#496455",
                        "on-surface-variant": "#424844",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e5e2dd",
                        "on-primary-fixed": "#062014",
                        "inverse-surface": "#31302d",
                        "on-surface": "#1c1c19",
                        "on-tertiary-fixed": "#211b0c",
                        "tertiary-container": "#484130",
                        "surface-bright": "#fcf9f4",
                        "primary-fixed-dim": "#b0cdbb",
                        "background": "#fcf9f4",
                        "surface-dim": "#dcdad5",
                        "secondary-container": "#ff9973",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#4d4634",
                        "on-secondary-fixed-variant": "#793013",
                        "inverse-on-surface": "#f3f0eb",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#ccead6",
                        "on-background": "#1c1c19",
                        "primary": "#173124",
                        "surface-container": "#f0ede8",
                        "secondary": "#974728",
                        "on-primary-container": "#98b5a3",
                        "inverse-primary": "#b0cdbb",
                        "tertiary": "#312b1b",
                        "tertiary-fixed-dim": "#d1c5ae",
                        "surface": "#fcf9f4",
                        "error": "#ba1a1a",
                        "outline-variant": "#c2c8c2",
                        "tertiary-fixed": "#ede1c9",
                        "on-secondary-container": "#772f12",
                        "on-secondary-fixed": "#380d00",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e5e2dd",
                        "surface-container-high": "#ebe8e3",
                        "primary-container": "#2d4739",
                        "on-error-container": "#93000a",
                        "outline": "#727973",
                        "secondary-fixed-dim": "#ffb59b"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .editorial-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
        }
        .text-vertical {
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-fixed selection:text-primary overflow-x-hidden">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-8">
    <div class="text-2xl font-bold tracking-tighter text-emerald-950 font-headline">The Curator</div>
    <div class="hidden md:block">
        <span class="text-[10px] uppercase tracking-[0.3em] font-bold text-on-surface-variant/40">Editorial Edition No. 04</span>
    </div>
</header>

<main class="min-h-screen relative flex items-center justify-center py-20 px-6">
    <div class="absolute inset-0 z-0 opacity-5 pointer-events-none">
        <div class="absolute top-1/4 right-10 text-vertical font-headline text-8xl font-extrabold tracking-tighter uppercase">Clyvasync</div>
        <div class="absolute bottom-1/4 left-10 text-vertical rotate-180 font-headline text-8xl font-extrabold tracking-tighter">ARCHIVE</div>
    </div>

    <div class="max-w-7xl w-full editorial-grid relative z-10">
        <div class="col-span-12 lg:col-span-7 relative h-[600px] lg:h-[800px] lg:order-1">
            <div class="absolute inset-0 w-full h-full rounded-xl overflow-hidden shadow-2xl transition-transform duration-700 hover:scale-[1.02]">
                <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1494412519320-aa613dfb7738?auto=format&fit=crop&q=80" alt="Minimalist Space"/>
                <div class="absolute inset-0 bg-gradient-to-t from-primary/40 via-transparent to-transparent"></div>
            </div>

            <div class="absolute top-12 left-12 text-white/90 z-20">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-[1px] bg-white/40"></div>
                    <span class="font-label text-xs tracking-[0.4em] font-medium uppercase">Secured Portal</span>
                </div>
            </div>

            <div class="absolute bottom-12 right-12 text-right text-white z-20">
                <p class="font-headline text-4xl font-bold tracking-tight leading-none mb-1">Clyvasync</p>
                <p class="font-body text-sm opacity-70 italic">Digital Archive Access</p>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-5 lg:-ml-12 flex items-center justify-center pt-12 lg:pt-0 lg:order-2">
            <div class="glass-card w-full max-w-lg p-12 lg:p-16 rounded-xl shadow-[0px_24px_48px_rgba(28,28,25,0.12)] border border-white/40 relative">

                <div class="mb-12">
                    <h1 class="font-headline text-5xl font-bold tracking-tighter text-primary mb-4">Welcome Back</h1>
                    <p class="text-on-surface-variant font-body leading-relaxed max-w-xs">
                        Enter your credentials to access your curated digital collection.
                    </p>
                </div>

                <div th:if="${param.error}" class="mb-6 p-4 bg-error/10 border-l-4 border-error text-error text-xs font-bold uppercase tracking-widest">
                    Authentication Failed: Invalid Player ID or Key.
                </div>

                <form th:action="@{/login}" method="post" class="space-y-6">
                    <div class="space-y-2">
                        <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant/60 font-bold px-4">Player ID</label>
                        <input name="username" required class="w-full px-6 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="curator@clyvasync.com" type="text"/>
                    </div>

                    <div class="space-y-2 relative">
                        <div class="flex justify-between items-center mb-1 px-4">
                            <label class="font-label text-xs uppercase tracking-widest text-on-surface-variant/60 font-bold">Secret Key</label>
                            <a th:href="@{/forgot-password}" class="text-[10px] uppercase tracking-widest text-secondary font-bold hover:underline decoration-secondary/30">Lost Key?</a>
                        </div>
                        <input name="password" required class="w-full px-6 py-4 bg-surface-container-high rounded-full border-none focus:ring-2 focus:ring-primary/20 transition-all font-body" placeholder="••••••••" type="password"/>
                    </div>

                    <button class="w-full py-5 px-8 bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full font-headline font-bold tracking-tight shadow-lg shadow-primary/20 hover:scale-[0.98] transition-transform flex items-center justify-center gap-3" type="submit">
                        <span>Authenticate</span>
                        <span class="material-symbols-outlined text-sm">login</span>
                    </button>
                </form>

                <div class="mt-10 pt-10 border-t border-primary/5">
                    <p class="text-center font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/40 mb-6 font-bold">Or continue with</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-3 py-3 px-6 bg-surface-container-lowest rounded-full border border-primary/5 hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-lg">shield</span>
                            <span class="font-label text-xs font-semibold">Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-3 py-3 px-6 bg-surface-container-lowest rounded-full border border-primary/5 hover:bg-surface-container-low transition-colors">
                            <span class="material-symbols-outlined text-lg">key</span>
                            <span class="font-label text-xs font-semibold">Apple</span>
                        </button>
                    </div>
                </div>

                <p class="mt-12 text-center text-sm text-on-surface-variant font-body">
                    Not a member yet? <a th:href="@{/register}" class="text-primary font-bold hover:underline">New Adventure</a>
                </p>
            </div>
        </div>
    </div>
</main>



</body>
</html>
